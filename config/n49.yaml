level:
  document: 6            # Documento 6 de 8 (entornos gestionados y médicos)
  n: 49                  # Número de parámetros
  b: 7                   # Base (n = b^2 = 49)
  layers: 7              # 7 capas de 7 parámetros
  threshold_intrusion: 38  # ⌊7 * 49 / 9⌋ = 38
  axis_angle: 7.3469     # 360° / 49
dataset:
  samples_per_class: 1000  # 1000 imágenes por clase → 3000 en total
  image_size: 224          # Tamaño en píxeles
  seed: 42                 # Semilla para reproducibilidad
split:
  train: 0.7               # 70 % entrenamiento
  val: 0.15                # 15 % validación
  # test = 0.15 implícito (lo calcula generate_dataset.py)
training:
  model: "resnet34"        # Modelo base (ResNet34)
  epochs: 25               # Épocas de entrenamiento
  batch_size: 32
  learning_rate: 1.0e-4
  lr_step_size: 7
  lr_gamma: 0.1
  num_workers: 4
