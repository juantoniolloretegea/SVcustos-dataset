level:
  document: 4            # Documento 4 de 8 (n = 36)
  n: 36                  # Número de parámetros
  b: 6                   # Base (n = b^2 = 36)
  layers: 6              # 6 capas de 6 parámetros
  threshold_intrusion: 28  # ⌊7 * 36 / 9⌋ = 28
  axis_angle: 10.0       # 360° / 36

dataset:
  samples_per_class: 1000  # 1000 imágenes por clase → 3000 en total
  image_size: 224          # Tamaño en píxeles
  seed: 42                 # Semilla para reproducibilidad

split:
  train: 0.7               # 70 % entrenamiento
  val: 0.15                # 15 % validación
  # test = 0.15 implícito (lo calcula generate_dataset.py)

training:
  model: "resnet34"        # Modelo base (ResNet34)
  epochs: 25               # Épocas de entrenamiento
  batch_size: 32
  learning_rate: 1.0e-4
  lr_step_size: 7
  lr_gamma: 0.1
  num_workers: 4
  # output_dir: "outputs/n36"   # si ya usa este campo en otros niveles
